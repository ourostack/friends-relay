name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  coverage-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run Coverage Gate
        run: npm run test:coverage

  docker-build:
    # Build the production image on every PR/push so a Dockerfile or build-stage
    # regression fails CI instead of slipping silently through to deploy (e.g. the
    # `prepare`/`npm ci` ordering bug fixed in #2 — the coverage-gate job never
    # exercises the image). Docker is preinstalled on ubuntu-latest runners.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t friends-relay-ci .
